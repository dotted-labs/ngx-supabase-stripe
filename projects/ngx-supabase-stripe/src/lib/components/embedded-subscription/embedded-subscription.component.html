<div class="checkout-container">
  @if (subscriptionsStore.isStatusLoading()) {
    <lib-embedded-skeleton />
  }
  
  @if (subscriptionsStore.isStatusError()) {
    <div class="error">
      <p><span i18n="@@stripe.common.error_label">Error:</span> {{ subscriptionsStore.error() }}</p>
    </div>
  }
  <div id="embedded-checkout"></div>
</div>
